name: Request Unity Activation File

# ライセンス発行用の一時ワークフロー。
# 手動実行(workflow_dispatch)で.alfファイルを生成してArtifactに保存する。
# license.unity3d.com/manual でこの.alfをアップロードして.ulfを取得したら、
# このワークフローファイルは不要となる
on:
  workflow_dispatch: {}

jobs:
  request:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: game-ci/unity-request-activation-file@v2
        id: activation
        with:
          unityVersion: 2022.3.62f3

      - uses: actions/upload-artifact@v4
        with:
          name: unity-activation-file
          path: ${{ steps.activation.outputs.filePath }}
